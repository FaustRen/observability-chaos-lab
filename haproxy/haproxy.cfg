global
    maxconn 4096
    log     stdout format raw local0
    # Patroni REST API health check 需要能發出 HTTP 請求
    # HAProxy 在 tcp mode 下使用 option httpchk 做七層健康檢查

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    retries 3
    timeout connect    5s
    timeout client    30s
    timeout server    30s
    timeout check      5s

# ── Stats Dashboard（port 7000）────────────────────────────────────────────
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    stats admin if TRUE

# ── Write 流量 → 當前 Primary（port 5432）───────────────────────────────────
# HAProxy 向每個節點的 Patroni REST API（port 8008）發送 GET /master
# 只有目前 Primary 回 HTTP 200；Replica 回 503 → HAProxy 不路由到該節點
# 當 Primary 故障後，etcd 租約到期，新 Primary 升格 → GET /master 開始回 200
# HAProxy 在下一次 check 週期（inter 3s）偵測到變更，自動切換路由目標
frontend pg_write
    bind *:5432
    default_backend pg_primary

backend pg_primary
    option  httpchk GET /master
    http-check expect status 200
    # inter   = health check 間隔（3秒）
    # fall    = 連續失敗 3 次 → 標記為 DOWN
    # rise    = 連續成功 2 次 → 標記為 UP
    # on-marked-down shutdown-sessions = 節點下線時立即斷開現有連線（讓應用快速重試）
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 maxconn 100 check port 8008
    server patroni2 patroni2:5432 maxconn 100 check port 8008
    server patroni3 patroni3:5432 maxconn 100 check port 8008

# ── Read 流量 → Replica 節點（port 5433）────────────────────────────────────
# GET /replica 只有 Replica 回 HTTP 200；Primary 回 503
# patroni1 標記為 backup（初始為 Primary，/replica 不通）
# patroni2、patroni3 為正常 Replica，輪詢提供讀服務
# Failover 後：舊 Primary 降格為 Replica → /replica 開始回 200 → 自動加入輪詢
frontend pg_readonly
    bind *:5433
    default_backend pg_replicas

backend pg_replicas
    balance roundrobin
    option  httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 maxconn 100 check port 8008 backup
    server patroni2 patroni2:5432 maxconn 100 check port 8008
    server patroni3 patroni3:5432 maxconn 100 check port 8008
